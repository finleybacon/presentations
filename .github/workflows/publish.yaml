name: Publish Quarto Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Check out repository
        uses: actions/checkout@v5

      # 2. Set up Python (needed for notebooks / execution)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 3. Install Jupyter dependencies
      - name: Install Jupyter dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbformat nbclient ipykernel

      # 4. Set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 5. Clean ALL cached/build artifacts
      - name: Clean previous build
        run: |
          rm -rf _site
          rm -rf .quarto
          rm -rf _freeze
          rm -rf .cache

      # 6. Render site (force full rebuild, no cache)
      - name: Render site
        run: quarto render --no-cache

      # 7. Publish to GitHub Pages
      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
